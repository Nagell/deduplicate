name: Release

on:
  push:
    branches: [main, dev]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: |
          dotnet publish Deduplicate.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=${{ needs.release-please.outputs.version }} `
            -o ./publish

      - name: Zip artifact
        run: |
          Compress-Archive -Path ./publish/* `
            -DestinationPath ./Deduplicate-v${{ needs.release-please.outputs.version }}-win-x64.zip

      - name: Append prerequisites to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ needs.release-please.outputs.tag_name }}"
          $current = (gh release view $tag --json body -q ".body")
          $footer = "`n---`n`n## Prerequisites`n`n> **Windows App SDK runtime required** — download and install from [Microsoft](https://learn.microsoft.com/en-us/windows/apps/windows-app-sdk/downloads) before running.`n> .NET 9 is bundled in the zip; no separate install needed."
          ($current + $footer) | Out-File -FilePath notes.md -Encoding utf8
          gh release edit $tag --notes-file notes.md

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ./Deduplicate-v${{ needs.release-please.outputs.version }}-win-x64.zip
