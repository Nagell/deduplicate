name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build & Publish
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: |
          dotnet publish Deduplicate.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:Version=${{ needs.release-please.outputs.version }} `
            -o ./publish

      - name: Zip artifact
        run: |
          Compress-Archive -Path ./publish/* `
            -DestinationPath ./Deduplicate-v${{ needs.release-please.outputs.version }}-win-x64.zip

      - name: Append prerequisites to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ needs.release-please.outputs.tag_name }}"
          $current = (gh release view $tag --json body -q ".body")
          $footer = "`n---`n`n## Installation`n`n1. **Before extracting:** right-click the zip → Properties → check **Unblock** → OK. This prevents Windows from silently blocking DLLs loaded by the app.`n2. Extract the zip and run ``Deduplicate.exe```n`n> **Windows App SDK runtime required** — download from [Microsoft](https://learn.microsoft.com/en-us/windows/apps/windows-app-sdk/downloads) if the app fails to start.`n> .NET 9 is bundled; no separate install needed.`n`n> **SmartScreen warning:** click *More info* → *Run anyway*. The app is unsigned — this warning appears for all unsigned executables."
          ($current + $footer) | Out-File -FilePath notes.md -Encoding utf8
          gh release edit $tag --notes-file notes.md

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ./Deduplicate-v${{ needs.release-please.outputs.version }}-win-x64.zip
