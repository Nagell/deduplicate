<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- White halos (rendered first, underneath black strokes) -->
  <rect x="8" y="20" width="44" height="56" rx="5"
        fill="white" stroke="white" stroke-width="6"/>
  <rect x="20" y="10" width="44" height="56" rx="5"
        fill="white" stroke="white" stroke-width="7"/>
  <circle cx="68" cy="72" r="18" fill="white" stroke="white" stroke-width="7"/>

  <!-- Back document -->
  <rect x="8" y="20" width="44" height="56" rx="5"
        fill="white" stroke="#0f0f0f" stroke-width="2"/>

  <!-- Front document -->
  <rect x="20" y="10" width="44" height="56" rx="5"
        fill="white" stroke="#0f0f0f" stroke-width="2.5"/>

  <!-- Content lines -->
  <rect x="28" y="26" width="28" height="2.5" rx="1.25" fill="#0f0f0f"/>
  <rect x="28" y="34" width="28" height="2.5" rx="1.25" fill="#0f0f0f"/>
  <rect x="28" y="42" width="18" height="2.5" rx="1.25" fill="#0f0f0f"/>

  <!-- Badge circle -->
  <circle cx="68" cy="72" r="18" fill="white" stroke="#0f0f0f" stroke-width="2.5"/>

  <!-- Badge minus -->
  <rect x="57" y="70.25" width="22" height="3.5" rx="1.75" fill="#0f0f0f"/>

</svg>
